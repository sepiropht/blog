<h3 class="heading">categories </h3>
<div class="row">
  <div class="categories">
    <div ng-repeat="category in vm.categories">
      <div class="col-md-6">
        <h4>{{category.title}}</h3>
        <p>
          {{category.description}}
        </p>
        <a href="#/articleBycategory/{{category.title}}"> View article</a>

      </div>
    </div>
  </div>
</div>


<h3  class="heading"> Last Articles </h3>
<div class="row">
    <div ng-repeat="article in vm.articles">
      <div class="col-md-12">
        <div class="articles">
          <h5>{{article.title}}</h5>
          <p>
            {{article.body | limitTo: 200}}
          </p>
            <a class ='btn btn-default' href="#/details/{{articles._id}}"> Read Article</a>
        </div>
      </div>
    </div>
    <div ng-if='vm.articles === false'>
      No articles
    </div>
</div>
